<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf MK5 Guide</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <a href="#home" class="logo">Golf MK5</a>

  <nav>
    <ul>
      <li><a href="#colors">Colors</a></li>
      <li><a href="#engines">Engines</a></li>
      <li><a href="#diagnose">Diagnose</a></li>
    </ul>
  </nav>
</header>

<!-- HOME -->
<section id="home">

  <div class="home-content">
    <h1>Welcome to Golf MK5 Guide</h1>
    <p>Everything about Volkswagen Golf MK5 in one place.</p>
  </div>

  <div class="slider">
    <button class="arrow left" onclick="prevSlide()">&#10094;</button>

    <img id="slideImage" src="img/golf5blue1.jpg" alt="Golf MK5">

    <button class="arrow right" onclick="nextSlide()">&#10095;</button>
  </div>

</section>

<!-- SECTIONS -->
<section id="colors">
  <h2>Colors</h2>
  <p>Factory colors of Golf MK5.</p>
</section>

<section id="engines">
  <h2>Engines</h2>
  <p>1.4, 1.6, 1.9 TDI, 2.0 GTI etc.</p>
</section>

<section id="diagnose">
  <h2>Diagnose</h2>
  <p>Common problems and OBD codes.</p>
</section>

<!-- JS -->
<script>
  let images = [
    "img/golf5blue1.jpg",
    "img/golf5blue2.jpg",
    "img/golf5blue3.jpg"
  ];

  let index = 0;
  let img = document.getElementById("slideImage");

  let isAnimating = false;

  function showSlide(direction) {
    if (isAnimating) return;
    isAnimating = true;

    // ieșire animație
    img.style.transform = direction === "next"
      ? "translateX(-100%)"
      : "translateX(100%)";

    img.style.opacity = "0";

    setTimeout(() => {
      index = direction === "next"
        ? (index + 1) % images.length
        : (index - 1 + images.length) % images.length;

      img.src = images[index];

      // reset poziție
      img.style.transition = "none";
      img.style.transform = direction === "next"
        ? "translateX(100%)"
        : "translateX(-100%)";

      setTimeout(() => {
        img.style.transition = "transform 0.6s ease, opacity 0.6s ease";
        img.style.transform = "translateX(0)";
        img.style.opacity = "1";
      }, 50);

      setTimeout(() => {
        isAnimating = false;
      }, 650);

    }, 300);
  }

  function nextSlide() {
    showSlide("next");
  }

  function prevSlide() {
    showSlide("prev");
  }
</script>

</body>
</html>
